<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — RKDKCW</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05050f;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --purple: #8b5cf6;
            --blue: #6366f1;
            --green: #10b981;
            --red: #ef4444;
            --text: #f1f5f9;
            --muted: rgba(241,245,249,0.4);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; border-right: 1px solid var(--border); padding: 32px 24px; display: flex; flex-direction: column; gap: 40px; }
        .logo { font-weight: 800; font-size: 22px; letter-spacing: -1px; }
        .logo span { color: var(--purple); }
        .nav-items { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 12px 18px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--muted); transition: all 0.2s; }
        .nav-item.active { background: rgba(139,92,246,0.1); color: var(--purple); }
        .nav-item:hover { color: var(--text); }
        .main-content { flex: 1; padding: 48px; overflow-y: auto; background-image: radial-gradient(circle at top right, rgba(139,92,246,0.05), transparent 60%); }
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 32px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 20px; }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 800; }
        .monitor-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 40px; }
        .monitor-card { background: var(--surface); border: 1px solid var(--border); padding: 32px; border-radius: 24px; }
        .api-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .api-row:last-child { border-bottom: none; }
        .api-name { font-weight: 600; font-size: 14px; }
        .api-status { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
        .dot.online { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .dot.offline { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .mem-gauge { height: 10px; background: rgba(255,255,255,0.05); border-radius: 99px; margin: 16px 0; overflow: hidden; }
        .mem-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--purple)); transition: width 0.5s; width: 0%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 16px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
        td { padding: 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
        .badge { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 700; }
        .badge.premium { background: rgba(139,92,246,0.15); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
        .badge.free { background: rgba(100,116,139,0.1); color: var(--muted); border: 1px solid var(--border); }
        .btn-toggle { background: var(--surface2); border: 1px solid var(--border); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .btn-toggle:hover { background: var(--surface); border-color: var(--purple); }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">RKD<span>KCW</span></div>
        <div class="nav-items">
            <div class="nav-item active">Overview</div>
            <div class="nav-item">Users</div>
            <div class="nav-item">Analytics</div>
            <a href="/logout" style="text-decoration: none; margin-top: auto;" class="nav-item">Logout</a>
        </div>
    </div>
    <div class="main-content">
        <h1>Admin Dashboard</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Users</div>
                <div class="stat-value" id="stat-users">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Premium Users</div>
                <div class="stat-value" id="stat-premium">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Processed Tasks</div>
                <div class="stat-value" id="stat-tasks">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Memory Used</div>
                <div class="stat-value" id="stat-mem">0%</div>
            </div>
        </div>

        <div class="monitor-grid">
            <div class="monitor-card">
                <div class="stat-label">Memory Usage (Render)</div>
                <div class="mem-gauge"><div class="mem-fill" id="mem-fill"></div></div>
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--muted);">
                    <span id="mem-used">0 MB</span>
                    <span id="mem-total">512 MB</span>
                </div>
            </div>
            <div class="monitor-card">
                <div class="stat-label">API Connectivity</div>
                <div id="api-status-list">
                    <div class="api-row"><span class="api-name">YouTube</span><div class="api-status"><div class="dot" id="api-yt"></div><span id="txt-yt">Checking</span></div></div>
                    <div class="api-row"><span class="api-name">Spotify</span><div class="api-status"><div class="dot" id="api-sp"></div><span id="txt-sp">Checking</span></div></div>
                    <div class="api-row"><span class="api-name">Roblox</span><div class="api-status"><div class="dot" id="api-rbx"></div><span id="txt-rbx">Checking</span></div></div>
                </div>
            </div>
        </div>

        <div class="monitor-card">
            <div class="stat-label">User Management</div>
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Joined At</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- Dynamic content -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function fetchStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();
                
                document.getElementById('stat-users').textContent = data.total_users;
                document.getElementById('stat-premium').textContent = data.premium_users;
                document.getElementById('stat-tasks').textContent = data.total_tasks;
                
                const memPct = data.memory.percent;
                document.getElementById('stat-mem').textContent = memPct.toFixed(1) + '%';
                document.getElementById('mem-fill').style.width = memPct + '%';
                document.getElementById('mem-used').textContent = (data.memory.used / 1024 / 1024).toFixed(0) + ' MB';
                document.getElementById('mem-total').textContent = (data.memory.total / 1024 / 1024).toFixed(0) + ' MB';

                const updateApi = (id, txtId, online) => {
                    const dot = document.getElementById(id);
                    const txt = document.getElementById(txtId);
                    dot.className = online ? 'dot online' : 'dot offline';
                    txt.textContent = online ? 'Connected' : 'Disconnected';
                    txt.style.color = online ? 'var(--green)' : 'var(--red)';
                };
                updateApi('api_yt', 'txt-yt', data.apis.youtube);
                updateApi('api_sp', 'txt-sp', data.apis.spotify);
                updateApi('api_rbx', 'txt-rbx', data.apis.roblox);
            } catch(e) { console.error("Failed to fetch stats", e); }
        }

        async function fetchUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const users = await res.json();
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';

                Object.entries(users).forEach(([name, info]) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${name}</td>
                        <td style="color:var(--muted)">${new Date(info.joined_at).toLocaleDateString()}</td>
                        <td><span class="badge ${info.is_premium ? 'premium' : 'free'}">${info.is_premium ? 'PREMIUM' : 'FREE'}</span></td>
                        <td><button class="btn-toggle" onclick="togglePremium('${name}')">Toggle Status</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) { console.error("Failed to fetch users", e); }
        }

        async function togglePremium(username) {
            await fetch('/api/admin/toggle_premium', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username })
            });
            fetchUsers();
            fetchStats();
        }

        setInterval(fetchStats, 10000);
        fetchStats();
        fetchUsers();
    </script>
</body>
</html>
